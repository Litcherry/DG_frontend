<section id="feedbackPageView" class="view">
  <div class="feedback-page">
    <section class="feedback-card">
      <span class="page-kicker">游客感受度</span>
      <h1>为本次导览体验打分</h1>
      <p>你的评分和补充反馈会进入管理后台的游客感受度报告，帮助景区优化讲解内容和服务设施。</p>
      <div class="feedback-score">
        <span>本次体验</span>
        <div id="ratingButtons" class="rating-buttons"></div>
      </div>
      <textarea id="feedbackComment" rows="6" placeholder="补充反馈：比如讲解是否清楚、路线是否合适、还想了解哪些内容"></textarea>
      <button id="feedbackBtn" class="primary" type="button">提交反馈</button>
    </section>
  </div>
</section>
