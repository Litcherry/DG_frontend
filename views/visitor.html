<section id="visitorView" class="view active">
          <div class="visitor-layout">
            <section class="guide-column">
              <div class="human-panel">
                <div class="stage-glow"></div>
                <div id="openAvatarStage" class="open-avatar-stage">
                  <canvas id="live2dCanvas" class="live2d-canvas"></canvas>
                  <div id="avatarEngineStatus" class="avatar-engine-status">Live2D 加载中</div>
                </div>
                <div id="virtualAnchor" class="virtual-anchor modern" aria-label="虚拟主播数字人">
                  <div class="anchor-aura"></div>
                  <div class="anchor-hair back"></div>
                  <div class="anchor-head">
                    <div class="anchor-bangs"></div>
                    <span class="anchor-ear left"></span>
                    <span class="anchor-ear right"></span>
                    <div class="anchor-face">
                      <span class="anchor-brow left"></span>
                      <span class="anchor-brow right"></span>
                      <span class="anchor-eye left"></span>
                      <span class="anchor-eye right"></span>
                      <span class="anchor-cheek left"></span>
                      <span class="anchor-cheek right"></span>
                      <span class="anchor-mouth"></span>
                    </div>
                    <span class="anchor-hairpin"></span>
                    <span class="anchor-mic"></span>
                  </div>
                  <div class="anchor-neck"></div>
                  <div class="anchor-outfit">
                    <span class="anchor-collar"></span>
                    <span class="anchor-ribbon"></span>
                    <span class="anchor-sleeve left"></span>
                    <span class="anchor-sleeve right"></span>
                    <span class="anchor-badge">AI</span>
                  </div>
                </div>
                <div id="digitalHuman" class="digital-human neutral modern">
                  <div class="halo"></div>
                  <div class="head">
                    <img id="humanAvatarImage" class="human-avatar-image" alt="" />
                    <div class="hair"></div>
                    <div class="face">
                      <span class="brow left"></span>
                      <span class="brow right"></span>
                      <span class="eye left"></span>
                      <span class="eye right"></span>
                      <span class="cheek left"></span>
                      <span class="cheek right"></span>
                      <span class="mouth"></span>
                    </div>
                  </div>
                  <div class="neck"></div>
                  <div class="body">
                    <span class="collar"></span>
                    <span class="sash"></span>
                    <span class="badge">AI</span>
                  </div>
                </div>
                <div class="human-meta">
                  <div>
                    <strong id="humanName">小导</strong>
                    <span id="humanVoiceMeta" class="human-voice-meta">女声 · 自然 · 亲切</span>
                  </div>
                  <span id="humanState">在线待命</span>
                </div>
              </div>

              <div class="tool-panel">
                <div class="section-title">
                  <div>
                    <h2>兴趣偏好</h2>
                    <span>影响讲解重点与路线推荐</span>
                  </div>
                </div>
                <div id="interestChips" class="chips"></div>
              </div>

              <div class="tool-panel visitor-human-config">
                <div class="section-title">
                  <div>
                    <h2>数字人形象</h2>
                    <span>游客端临时调节，立即预览</span>
                  </div>
                </div>
                <div class="visitor-human-grid">
                  <label>引擎
                    <select id="visitorAvatarEngine">
                      <option value="live2d">Mark Live2D 导游</option>
                    </select>
                  </label>
                  <label>外观
                    <select id="visitorAppearance">
                      <option value="modern">现代导游</option>
                      <option value="hanfu">汉服讲解员</option>
                      <option value="nature">自然探索员</option>
                    </select>
                  </label>
                  <label>声音
                    <select id="visitorVoiceGender">
                      <option value="female">女声</option>
                      <option value="male">男声</option>
                    </select>
                  </label>
                  <label>语速
                    <select id="visitorVoiceSpeed">
                      <option value="slow">舒缓</option>
                      <option value="medium">自然</option>
                      <option value="fast">轻快</option>
                    </select>
                  </label>
                  <label>表情
                    <select id="visitorExpression">
                      <option value="lively">活泼</option>
                      <option value="calm">沉稳</option>
                      <option value="warm">温暖</option>
                    </select>
                  </label>
                </div>
              </div>

            </section>

            <section class="chat-shell">
              <div class="chat-head">
                <div class="guide-status">
                  <span class="guide-live-dot"></span>
                  <strong>小导在线</strong>
                  <span id="conversationBadge">新的导览会话</span>
                </div>
              </div>
              <div id="chatMessages" class="chat-messages"></div>
              <div class="quick-questions">
                <button type="button" data-question="有什么景点推荐">热门景点</button>
                <button type="button" data-question="我对历史文化感兴趣，帮我规划一条路线">历史路线</button>
                <button type="button" data-question="适合亲子游的路线怎么走">亲子游</button>
                <button type="button" data-question="附近有哪些服务设施需要注意">服务设施</button>
              </div>
              <div class="composer-wrap">
                <div id="voiceStatus" class="voice-status" aria-live="polite">
                  <span class="voice-wave"><i></i><i></i><i></i><i></i></span>
                  <span>正在聆听…</span>
                </div>
                <button id="stopReplyBtn" class="stop-reply-btn" type="button" title="停止语音回复">
                  <span class="stop-icon"></span>
                  <span>停止回复</span>
                </button>
                <div class="composer">
                  <button id="attachmentBtn" class="composer-icon-btn" title="添加附件" type="button" aria-label="添加附件">
                    <svg class="composer-svg-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M12 5v14M5 12h14"></path>
                    </svg>
                  </button>
                  <textarea id="chatInput" rows="1" placeholder="有问题，尽管问"></textarea>
                  <button id="voiceBtn" class="composer-icon-btn" title="语音输入" type="button" aria-label="语音输入">
                    <svg class="composer-svg-icon mic-svg" viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="9" y="3" width="6" height="12" rx="3"></rect>
                      <path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18v3M9 21h6"></path>
                    </svg>
                  </button>
                  <button id="sendBtn" class="send-icon-btn" title="发送" type="button" aria-label="发送" disabled>
                    <svg class="composer-svg-icon send-svg" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="m5 12 7-7 7 7M12 5v14"></path>
                    </svg>
                  </button>
                </div>
              </div>
            </section>

            <aside id="historyPanel" class="history-panel">
              <div class="history-head">
                <div>
                  <strong>导览会话</strong>
                  <span>最近记录</span>
                </div>
                <button id="historyCloseBtn" class="panel-toggle" type="button" title="收起会话栏" aria-label="收起会话栏">
                  <span class="panel-toggle-icon"></span>
                </button>
              </div>
              <button id="newConversationBtn" class="new-chat-btn" type="button">
                <span class="new-chat-icon"></span>
                <span>新聊天</span>
              </button>
              <div class="history-section-title">最近</div>
              <div id="historyList" class="history-list"></div>
            </aside>
          </div>
        </section>
