<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCENIC GUIDE - ROAM</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(#f0f0f0, #e0e0e0);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .container {
            width: 100%;
            height: 100%;
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 大标题 - 空芯效果 */
        .title {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 105px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px #AAAAAA;
            text-stroke: 2px #AAAAAA;
            white-space: nowrap;
            letter-spacing: -4px;
            pointer-events: none;
            user-select: none;
            z-index: 1;
            text-transform: uppercase;
        }
        
        /* 已移除左侧文字、右侧条纹、人物 */
        
        /* 底部文字 - 空芯效果 */
        .bottom-text {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 86px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px #AAAAAA;
            text-stroke: 2px #AAAAAA;
            white-space: nowrap;
            letter-spacing: -8px;
            pointer-events: none;
            user-select: none;
            z-index: 1;
            text-transform: uppercase;
        }
        
        .footer {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 14px;
            color: #666;
            z-index: 4;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 大标题 -->
        <div class="title">SCENIC GUIDE DISCOVER EXPLORE</div>
        
        <!-- 左侧文字已移除 -->
        <!-- 右侧条纹已移除 -->
        <!-- 人物已移除 -->
        
        <!-- 底部文字 -->
        <div class="bottom-text">ROAM</div>
        
        <!-- 小图标 -->
        <div class="footer">
            <div style="width: 30px; height: 30px; border: 3px solid #333; border-radius: 50%; margin-left: auto; display: flex; align-items: center; justify-content: center; font-size: 18px;">▶</div>
        </div>
    </div>
</body>
</html>
